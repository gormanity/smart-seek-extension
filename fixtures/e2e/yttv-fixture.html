<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube TV Shape Fixture</title>
    <style>
      body {
        margin: 0;
        background: #0f0f0f;
        color: #f8fafc;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(960px, calc(100vw - 32px));
        margin: 32px auto;
      }

      video {
        display: block;
        width: 720px;
        max-width: 100%;
        aspect-ratio: 16 / 9;
        background: #020617;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>YouTube TV Fixture</h1>
      <video id="primary-video" tabindex="0"></video>
    </main>
    <script>
      const video = document.querySelector("#primary-video");
      Object.defineProperty(video, "paused", {
        get: () => false,
        configurable: true,
      });
      Object.defineProperty(video, "readyState", {
        get: () => 4,
        configurable: true,
      });
      Object.defineProperty(video, "duration", {
        get: () => 600,
        configurable: true,
      });
      video.currentTime = 10;
    </script>
  </body>
</html>
